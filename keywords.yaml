# ============================================================
# KEYWORDS DO CLIPPING - VERSÃO POR SETORES TEMÁTICOS
# ============================================================
#
# REGRA DE OURO: empresas globais sem operação brasileira
# relevante ficam SÓ em "Global Consumer". Evita que uma
# matéria sobre Zara Espanha apareça em Fashion BR e Global.
#
# Formatos:
#   - alias_simples              (string - match direto)
#   - alias: <termo>             (dict - requer contexto)
#     requires_any: [...]
#     requires_none: [...]       (opcional - bloqueia se aparecer)
# ============================================================

