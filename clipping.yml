name: Clipping diário
# Roda o scraper todo dia útil de manhã, salva JSON e publica no GitHub Pages..

on:
  schedule:
    # 09:30 UTC = 06:30 horário de Brasília (UTC-3), todos os dias
    - cron: '30 9 * * *'
  # Botão "Run workflow" manual (útil pra testar ou re-scorear)
  workflow_dispatch:
    inputs:
      rescore:
        description: 'Re-aplicar matching em todos os artigos existentes (use depois de mudar keywords.yaml)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: clipping-daily
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instala Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instala dependências
        run: pip install feedparser requests beautifulsoup4 pyyaml

      - name: Roda o clipping com rescore
        if: ${{ inputs.rescore }}
        run: python clipping.py --output-json data/articles.json --since 48 --rescore --probe-experimental

      - name: Roda o clipping normal
        if: ${{ !inputs.rescore }}
        run: python clipping.py --output-json data/articles.json --since 48 --probe-experimental

      - name: Commita o resultado (se houver mudanças)
        run: |
          git config user.name "clipping-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          if git diff --staged --quiet; then
            echo "Sem novidades."
          else
            git commit -m "Clipping $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
