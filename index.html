<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Retail Daily</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --bg-elevated: #f5f5f7;
    --text: #1d1d1f;
    --text-muted: #6e6e73;
    --border: #d2d2d7;
    --accent: #0071e3;
    --accent-fg: #ffffff;
    --selected-bg: #e8f1ff;
    --selected-border: #0071e3;
    --danger: #ff3b30;
    --tag-bg: rgba(0,113,227,0.12);
    --tag-fg: #0071e3;
    --alias-tag-bg: rgba(120,120,128,0.12);
    --alias-tag-fg: #6e6e73;
    --shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --bg-elevated: #1c1c1e;
      --text: #f5f5f7;
      --text-muted: #98989d;
      --border: #38383a;
      --accent: #0a84ff;
      --accent-fg: #ffffff;
      --selected-bg: #13325c;
      --selected-border: #0a84ff;
      --danger: #ff453a;
      --tag-bg: rgba(10,132,255,0.18);
      --tag-fg: #6cb6ff;
      --alias-tag-bg: rgba(152,152,157,0.18);
      --alias-tag-fg: #c0c0c5;
      --shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    font-size: 15px; line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: color-mix(in srgb, var(--bg) 90%, transparent);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
    padding-top: max(14px, env(safe-area-inset-top));
  }
  .header-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
  }
  h1 {
    margin: 0;
    font-size: 22px; font-weight: 700; letter-spacing: -0.4px;
    color: var(--text);
  }
  .add-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--bg-elevated);
    color: var(--text);
    border: 1px solid var(--border);
    font-size: 22px;
    font-weight: 300;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    -webkit-appearance: none;
  }
  .add-btn:active { background: var(--border); }
  #status {
    font-size: 13px; color: var(--text-muted);
    margin-top: 2px;
  }
  .search-bar {
    display: flex; gap: 8px; margin-top: 10px;
  }
  .search-input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text);
    border-radius: 8px;
    font-size: 14px;
    -webkit-appearance: none;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .filters {
    display: flex; gap: 6px; padding: 10px 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border-bottom: 1px solid var(--border);
  }
  .filters::-webkit-scrollbar { display: none; }
  .pill {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-muted);
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    -webkit-appearance: none;
  }
  .pill.active {
    background: var(--accent); color: var(--accent-fg);
    border-color: var(--accent);
  }

  main {
    padding: 8px 16px 100px;
  }
  .group { margin-bottom: 18px; }
  .group-title {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--text-muted);
    padding: 16px 0 10px;
  }
  .count {
    display: inline-block;
    margin-left: 6px;
    background: var(--bg-elevated);
    color: var(--text-muted);
    padding: 1px 6px;
    border-radius: 100px;
    font-size: 10.5px; font-weight: 600;
  }
  article {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    display: flex; gap: 10px; align-items: flex-start;
    transition: background 0.15s, border-color 0.15s;
  }
  article.selected {
    background: var(--selected-bg);
    border-color: var(--selected-border);
  }
  .check {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border: 2px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .check.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check.checked::after {
    content: '';
    width: 5px; height: 9px;
    border: solid var(--accent-fg);
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }
  .article-body { flex: 1; min-width: 0; }
  .article-title-row {
    display: flex; align-items: center; gap: 6px;
    flex-wrap: wrap;
  }
  article a {
    color: var(--text);
    text-decoration: none;
    font-size: 15px; font-weight: 600;
    line-height: 1.35;
    word-wrap: break-word;
    flex: 1;
    min-width: 0;
  }
  article a:hover { color: var(--accent); }
  .manual-badge {
    font-size: 12px;
    flex-shrink: 0;
    cursor: help;
  }
  .delete-manual {
    background: none; border: none;
    color: var(--text-muted);
    font-size: 14px; padding: 0 4px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .delete-manual:hover { color: var(--danger); }
  .article-meta {
    margin-top: 6px;
    font-size: 12.5px; color: var(--text-muted);
    display: flex; gap: 8px; flex-wrap: wrap;
    align-items: center;
  }
  .source-tag {
    background: var(--alias-tag-bg);
    color: var(--text);
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11px;
  }
  .article-aliases {
    margin-top: 6px;
    font-size: 11.5px; color: var(--text-muted);
  }
  .alias-tag {
    display: inline-block;
    background: var(--alias-tag-bg);
    color: var(--alias-tag-fg);
    padding: 1px 6px; margin-right: 4px;
    border-radius: 4px;
    font-size: 11px;
  }
  .summary {
    margin-top: 6px;
    font-size: 13px; color: var(--text-muted);
    line-height: 1.45;
  }
  .tag {
    display: inline-block;
    background: var(--tag-bg);
    color: var(--tag-fg);
    padding: 1px 7px; margin-right: 4px;
    border-radius: 4px;
    font-size: 11px;
  }
  .empty {
    padding: 60px 20px; text-align: center;
    color: var(--text-muted); font-size: 14px; line-height: 1.6;
  }

  .action-bar {
    position: fixed; left: 0; right: 0;
    bottom: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: color-mix(in srgb, var(--bg) 95%, transparent);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center;
    transform: translateY(100%);
    transition: transform 0.2s ease-out;
    z-index: 20;
  }
  .action-bar.visible { transform: translateY(0); }

  /* Action bar dentro da tela de review: sticky no fim do scroll
     para sempre ficar fixo na parte inferior independente de quantas
     materias tiverem na lista. Position fixed nao funciona bem aqui
     porque .screen tem transform, e transform cria um novo containing
     block para fixed. Sticky no fim do flex-container funciona. */
  .review-action-bar {
    flex-shrink: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: color-mix(in srgb, var(--bg) 95%, transparent);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center;
    z-index: 5;
  }
  .selected-count {
    font-size: 13px; font-weight: 500;
    color: var(--text-muted);
    flex: 1;
  }
  .selected-count strong { color: var(--text); font-size: 15px; }
  .btn {
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 14px; font-weight: 600;
    border: none; cursor: pointer;
    -webkit-appearance: none;
  }
  .btn-primary {
    background: var(--accent); color: var(--accent-fg);
  }
  .btn-primary:active { opacity: 0.85; }
  .btn-ghost {
    background: none; color: var(--text-muted);
    border: 1px solid var(--border);
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 40;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    visibility: hidden;
    opacity: 0;
    transition: opacity 0.2s, visibility 0.2s;
  }
  .modal-overlay.visible {
    visibility: visible;
    opacity: 1;
  }
  .modal {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 480px;
    padding: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }
  .modal h2 {
    font-size: 18px;
    margin-bottom: 16px;
    color: var(--text);
  }
  .modal label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 4px;
    color: var(--text-muted);
  }
  .modal input, .modal textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
    font-family: inherit;
  }
  .modal input:focus, .modal textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* telas de review */
  .screen {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 30;
    transform: translateX(100%);
    transition: transform 0.25s ease-out;
    overflow-y: auto;
    /* Em vez de padding-bottom rígido, usamos a altura da action-bar
       interna que agora é sticky no fim do scroll */
    display: flex;
    flex-direction: column;
  }
  .screen.visible { transform: translateX(0); }
  .screen-header {
    position: sticky; top: 0; z-index: 2;
    background: color-mix(in srgb, var(--bg) 90%, transparent);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  /* Conteúdo scrollável da review (entre header sticky e action-bar) */
  .screen-content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .back {
    background: none; border: none; color: var(--accent);
    font-size: 15px; cursor: pointer;
    padding: 4px 0;
  }
  .screen-title { font-size: 17px; font-weight: 600; flex: 1; text-align: center; }
  .screen-title-spacer { width: 50px; }
  .reorder-hint {
    padding: 12px 16px;
    font-size: 12.5px; color: var(--text-muted);
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
  }
  .reorder-list { padding: 8px 16px 20px; }
  .reorder-item {
    display: flex; gap: 10px; align-items: center;
    padding: 12px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    transition: transform 0.18s cubic-bezier(0.2, 0, 0, 1),
                opacity 0.15s, box-shadow 0.15s, border-color 0.15s;
  }
  /* Quando arrastando: item flutua, outros itens "abrem espaço" via transform */
  .reorder-item.dragging {
    opacity: 0.95;
    box-shadow: 0 12px 28px rgba(0,0,0,0.35);
    z-index: 10;
    transition: none;
    cursor: grabbing;
    border-color: var(--accent);
  }
  .reorder-item.shifted-down {
    transform: translateY(var(--shift-amount, 60px));
  }
  .reorder-item.shifted-up {
    transform: translateY(calc(-1 * var(--shift-amount, 60px)));
  }
  .drag-handle {
    flex-shrink: 0;
    padding: 8px 10px;
    margin: -6px 0 -6px -8px;
    color: var(--text-muted);
    font-size: 22px; line-height: 1;
    cursor: grab;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    /* Aumenta área de toque sem aumentar visualmente */
    min-width: 36px;
    text-align: center;
  }
  .drag-handle:active { cursor: grabbing; }
  .reorder-item-body { flex: 1; min-width: 0; }
  .reorder-title {
    font-size: 14px; font-weight: 500;
    line-height: 1.35; color: var(--text);
  }
  .reorder-url {
    font-size: 11.5px; color: var(--text-muted);
    margin-top: 4px; word-break: break-all;
  }
  /* Botões de ação no item (mover topo, mover fim, remover) */
  .item-actions {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex-shrink: 0;
  }
  .item-action-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 11px;
    padding: 4px 6px;
    cursor: pointer;
    line-height: 1;
    min-width: 32px;
    -webkit-appearance: none;
  }
  .item-action-btn:active { background: var(--bg); opacity: 0.7; }
  .item-action-btn.danger { color: var(--danger); border-color: var(--danger); }
  .item-action-btn:disabled {
    opacity: 0.3;
    cursor: default;
    pointer-events: none;
  }
  .preview {
    margin: 16px; padding: 14px;
    background: var(--bg-elevated);
    border-radius: 10px;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 12px;
    line-height: 1.55;
    color: var(--text-muted);
    white-space: pre-wrap;
    word-break: break-all;
    border: 1px solid var(--border);
  }
  .copy-success {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text); color: var(--bg);
    padding: 10px 18px;
    border-radius: 100px;
    font-size: 13px; font-weight: 500;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 50;
  }
  .copy-success.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  table.sources-table {
    width: 100%; border-collapse: collapse;
    margin-top: 30px; font-size: 12px;
  }
  table.sources-table th, table.sources-table td {
    padding: 6px 8px; text-align: left;
    border-bottom: 1px solid var(--border);
  }
  table.sources-table th {
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-size: 10.5px;
  }
  details summary {
    cursor: pointer;
    font-size: 13px;
    color: var(--text-muted);
    padding: 16px;
    user-select: none;
  }
  details summary:hover { color: var(--text); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-row">
      <h1>Retail Daily</h1>
      <button class="add-btn" onclick="openAddModal()" title="Adicionar artigo manual">+</button>
    </div>
    <div id="status">Carregando…</div>
    <div class="search-bar">
      <input type="search" class="search-input" id="search" placeholder="Buscar título ou resumo…" autocomplete="off">
    </div>
  </header>
  <div class="filters">
    <button class="pill active" data-days="1">1d</button>
    <button class="pill" data-days="2">2d</button>
    <button class="pill" data-days="3">3d</button>
    <button class="pill" data-days="4">4d</button>
    <button class="pill" data-days="5">5d</button>
  </div>
  <main id="list"></main>

  <div class="action-bar" id="action-bar">
    <div class="selected-count">
      <strong id="selected-n">0</strong> selecionadas
    </div>
    <button class="btn btn-ghost" onclick="clearSelection()">Limpar</button>
    <button class="btn btn-primary" onclick="openReview()">Revisar →</button>
  </div>
</div>

<div class="screen" id="review-screen">
  <div class="screen-header">
    <button class="back" onclick="closeReview()">← Voltar</button>
    <div class="screen-title">Revisar clipping</div>
    <div class="screen-title-spacer"></div>
  </div>
  <div class="screen-content">
    <div class="reorder-hint">
      Arraste pelo <strong>⋮⋮</strong> para reordenar, ou use <strong>⤒</strong> (topo) e <strong>⤓</strong> (fim). Toque no <strong>×</strong> para remover.
    </div>
    <div class="reorder-list" id="reorder-list"></div>
    <div class="preview" id="preview"></div>
  </div>
  <div class="review-action-bar">
    <div class="selected-count">
      <strong id="preview-n">0</strong> no clipping
    </div>
    <button class="btn btn-primary" onclick="copyClipping()">📋 Copiar</button>
  </div>
</div>

<div class="copy-success" id="copy-toast">Copiado!</div>

<div id="sources-container" style="padding: 0 16px 40px;"></div>

<!-- Modal de adicionar artigo manual -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2>Adicionar artigo</h2>
    <label for="manual-url">URL</label>
    <input type="url" id="manual-url" placeholder="https://..." autocomplete="off">
    <label for="manual-title">Título</label>
    <input type="text" id="manual-title" placeholder="Título do artigo">
    <label for="manual-summary">Resumo (opcional)</label>
    <textarea id="manual-summary" rows="3" placeholder="Resumo da matéria…"></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveManualArticle()">Adicionar</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ============================================================
// Mapeamento de setores e veículos
// ============================================================
const SECTOR_LABELS = {
  'Fashion': 'Moda',
  'Joias': 'Joias',
  'E-commerce': 'E‑commerce',
  'Varejo Alimentar': 'Varejo Alimentar',
  'Academias': 'Academias',
  'Cosméticos': 'Cosméticos',
  'Farmácias': 'Farmácias',
  'Economia': 'Economia',
  'Material de Construção': 'Material de Construção',
  'Eletrônicos': 'Eletrônicos',
  'Viagens': 'Viagens',
  'Pet': 'Pet',
  'Wellness e Esportes': 'Wellness/Esportes',
  'Global Consumer': 'Global',
};

// ORDEM DE PRIORIDADE DEFINIDA PELO USUÁRIO
const SECTOR_PRIORITY = [
  'E-commerce',
  'Farmácias',
  'Academias',
  'Varejo Alimentar',
  'Fashion',
  'Cosméticos',
  'Joias',
  'Eletrônicos',
  'Wellness e Esportes',
  'Pet',
  'Material de Construção',
  'Viagens',
  'Economia',
  'Global Consumer'
];

// Regras de extração de veículo a partir da URL
const SOURCE_PATTERNS = [
  [/valor\.globo\.com|valor\.com\.br|valorinveste/i, 'Valor'],
  [/pipeline\.valor|pipelinevalor/i,                'Pipeline'],
  [/oglobo\.globo\.com/i,                           'O Globo'],
  [/epocanegocios\.globo/i,                         'Época Negócios'],
  [/revistapegn\.globo/i,                           'PEGN'],
  [/folha\.uol\.com\.br|folha\.com\.br/i,            'Folha'],
  [/estadao\.com\.br/i,                             'Estadão'],
  [/exame\.com/i,                                   'Exame'],
  [/veja\.abril\.com\.br/i,                         'Veja'],
  [/uol\.com\.br/i,                                 'UOL'],
  [/jota\.info/i,                                   'JOTA'],
  [/mercadoeconsumo/i,                              'M&C'],
  [/neofeed/i,                                      'NeoFeed'],
  [/braziljournal/i,                                'Brazil Journal'],
  [/bloomberglinea/i,                               'Bloomberg Línea'],
  [/bloomberg\.com/i,                               'Bloomberg'],
  [/reuters/i,                                      'Reuters'],
  [/cnbc/i,                                         'CNBC'],
  [/forbes/i,                                       'Forbes'],
  [/bbc/i,                                          'BBC'],
  [/ft\.com/i,                                      'FT'],
  [/wsj\.com|dowjones/i,                            'WSJ'],
  [/cnnbrasil/i,                                    'CNN Brasil'],
  [/poder360/i,                                     'Poder360'],
  [/infomoney/i,                                    'InfoMoney'],
  [/anvisa\.gov/i,                                  'Anvisa'],
  [/gov\.br\/receitafederal/i,                       'Receita Federal'],
  [/news\.google/i,                                 'Google News'],
];

function extractSource(url) {
  if (!url) return '';
  for (const [re, name] of SOURCE_PATTERNS) {
    if (re.test(url)) return name;
  }
  try {
    const host = new URL(url).hostname.replace(/^www\./, '');
    return host.split('.')[0];
  } catch { return ''; }
}

// ============================================================
// Estado da aplicação
// ============================================================
const state = {
  articles: [],
  manualArticles: [],
  generatedAt: null,
  daysFilter: 1,
  query: '',
  selected: new Set(),
  order: [],
};

const STORAGE_KEYS = {
  selected: 'retail-daily-selected',
  order: 'retail-daily-order',
  manual: 'retail-daily-manual',
};

function loadState() {
  try {
    const sel = localStorage.getItem(STORAGE_KEYS.selected);
    if (sel) state.selected = new Set(JSON.parse(sel));
    const ord = localStorage.getItem(STORAGE_KEYS.order);
    if (ord) state.order = JSON.parse(ord);
    const man = localStorage.getItem(STORAGE_KEYS.manual);
    if (man) state.manualArticles = JSON.parse(man);
  } catch (e) {
    console.error('Erro carregando estado:', e);
  }
}

function persist() {
  try {
    localStorage.setItem(STORAGE_KEYS.selected, JSON.stringify([...state.selected]));
    localStorage.setItem(STORAGE_KEYS.order, JSON.stringify(state.order));
  } catch (e) { console.error(e); }
}

function saveManualArticles() {
  try {
    localStorage.setItem(STORAGE_KEYS.manual, JSON.stringify(state.manualArticles));
  } catch (e) { console.error(e); }
}

// ============================================================
// Utilidades
// ============================================================
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

function formatDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    const now = new Date();
    const diffH = (now - d) / (1000 * 60 * 60);
    if (diffH < 1) return Math.max(1, Math.floor(diffH * 60)) + 'min';
    if (diffH < 24) return Math.floor(diffH) + 'h';
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
  } catch { return ''; }
}

function relative(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    const diffM = (Date.now() - d) / (1000 * 60);
    if (diffM < 1) return 'agora';
    if (diffM < 60) return Math.floor(diffM) + 'min atrás';
    if (diffM < 24 * 60) return Math.floor(diffM / 60) + 'h atrás';
    return d.toLocaleDateString('pt-BR');
  } catch { return ''; }
}

// ============================================================
// Carregamento dos dados
// ============================================================
async function fetchData() {
  try {
    const r = await fetch('data/articles.json?v=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    state.articles = data.articles || [];
    state.generatedAt = data.generated_at;
  } catch (e) {
    document.getElementById('status').textContent = 'Erro carregando dados.';
    console.error(e);
  }
}

// ============================================================
// Render
// ============================================================
function getAllArticles() {
  return [...state.articles, ...state.manualArticles];
}

function filterArticles(articles) {
  const cutoff = Date.now() - state.daysFilter * 24 * 60 * 60 * 1000;
  const q = state.query.trim().toLowerCase();
  return articles.filter(a => {
    if (cutoff && a.published && new Date(a.published).getTime() < cutoff) return false;
    if (q) {
      const hay = (a.title + ' ' + (a.summary || '')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function getPrimarySector(sectors) {
  if (!sectors || sectors.length === 0) return null;
  for (const prioritySector of SECTOR_PRIORITY) {
    if (sectors.includes(prioritySector)) {
      return prioritySector;
    }
  }
  return sectors[0];
}

function render() {
  const all = getAllArticles();
  const filtered = filterArticles(all);

  const parts = [];
  if (state.generatedAt) parts.push('Atualizado ' + relative(state.generatedAt));
  const manualCount = state.manualArticles.length;
  const totalCount = filtered.length;
  parts.push(totalCount + (totalCount === 1 ? ' matéria' : ' matérias'));
  if (manualCount > 0) parts.push(`✏️ ${manualCount} manual(is)`);
  document.getElementById('status').textContent = parts.join(' · ');

  if (!filtered.length) {
    document.getElementById('list').innerHTML = '<div class="empty">Nenhuma matéria com os filtros atuais.</div>';
    updateActionBar();
    document.getElementById('sources-container').innerHTML = '';
    return;
  }

  const groups = {};
  for (const a of filtered) {
    const primary = getPrimarySector(a.matched_sectors);
    const key = primary || '— OUTROS';
    (groups[key] = groups[key] || []).push(a);
  }

  for (const key of Object.keys(groups)) {
    groups[key].sort((a, b) => {
      const ta = a.published ? new Date(a.published).getTime() : -Infinity;
      const tb = b.published ? new Date(b.published).getTime() : -Infinity;
      return tb - ta;
    });
  }

  const orderedKeys = Object.keys(groups).sort((a, b) => {
    if (a === '— OUTROS') return 1;
    if (b === '— OUTROS') return -1;
    const indexA = SECTOR_PRIORITY.indexOf(a);
    const indexB = SECTOR_PRIORITY.indexOf(b);
    if (indexA === -1 && indexB === -1) return a.localeCompare(b);
    if (indexA === -1) return 1;
    if (indexB === -1) return -1;
    return indexA - indexB;
  });

  function getGroupTitle(key) {
    if (key === '— OUTROS') return '— OUTROS';
    return SECTOR_LABELS[key] || key;
  }

  document.getElementById('list').innerHTML = orderedKeys.map(key => {
    const articles = groups[key];
    return `
    <section class="group">
      <div class="group-title">${esc(getGroupTitle(key))}<span class="count">${articles.length}</span></div>
      ${articles.map(a => {
        const sourceLabel = extractSource(a.url);
        const sourceTag = sourceLabel ? `<span class="source-tag">${esc(sourceLabel)}</span>` : '';
        const otherSectors = (a.matched_sectors || []).filter(s => s !== key).map(s => `<span class="tag">${esc(s)}</span>`).join('');
        const aliases = (a.matched_aliases || []).map(al => `<span class="alias-tag">${esc(al)}</span>`).join('');
        const isSelected = state.selected.has(a.url);
        const isManual = a._manual === true;
        return `
        <article class="${isSelected ? 'selected' : ''}" data-url="${esc(a.url)}">
          <div class="check ${isSelected ? 'checked' : ''}" data-url="${esc(a.url)}"></div>
          <div class="article-body">
            <div class="article-title-row">
              <a href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.title)}</a>
              ${isManual ? `<span class="manual-badge" title="Adicionado manualmente">✏️</span>` : ''}
              ${isManual ? `<button class="delete-manual" data-url="${esc(a.url)}" onclick="deleteManualArticle('${esc(a.url)}')" title="Remover artigo manual">🗑️</button>` : ''}
            </div>
            <div class="article-meta">
              ${sourceTag}
              ${a.published ? esc(formatDate(a.published)) : ''}
              ${otherSectors}
            </div>
            ${aliases ? `<div class="article-aliases">🔍 ${aliases}</div>` : ''}
            ${a.summary ? `<div class="summary">${esc(a.summary)}</div>` : ''}
          </div>
        </article>`;
      }).join('')}
    </section>`;
  }).join('');

  document.querySelectorAll('.check').forEach(box => {
    box.onclick = (e) => {
      e.preventDefault(); e.stopPropagation();
      toggleSelect(box.dataset.url);
    };
  });

  updateActionBar();
  renderSourcesTable(filtered);
}

function renderSourcesTable(articles) {
  const container = document.getElementById('sources-container');
  if (!articles.length) { container.innerHTML = ''; return; }
  const counts = {};
  for (const a of articles) {
    const src = extractSource(a.url) || '?';
    counts[src] = (counts[src] || 0) + 1;
  }
  const rows = Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .map(([src, n]) => `<tr><td>${esc(src)}</td><td style="text-align:right">${n}</td></tr>`)
    .join('');
  container.innerHTML = `
    <details>
      <summary>📊 Estatísticas (${articles.length} matérias)</summary>
      <table class="sources-table">
        <thead><tr><th>Fonte</th><th style="text-align:right">N</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </details>
  `;
}

// ============================================================
// Seleção
// ============================================================
function toggleSelect(url) {
  if (state.selected.has(url)) {
    state.selected.delete(url);
    state.order = state.order.filter(u => u !== url);
  } else {
    state.selected.add(url);
    state.order.push(url);
  }
  persist();
  render();
}

function clearSelection() {
  state.selected.clear();
  state.order = [];
  persist();
  render();
}

function updateActionBar() {
  const n = state.selected.size;
  document.getElementById('selected-n').textContent = n;
  document.getElementById('action-bar').classList.toggle('visible', n > 0);
}

function getSelectedArticlesInOrder() {
  const all = getAllArticles();
  const byUrl = {};
  for (const a of all) byUrl[a.url] = a;
  const orderedUrls = state.order.filter(u => state.selected.has(u));
  for (const u of state.selected) {
    if (!orderedUrls.includes(u)) orderedUrls.push(u);
  }
  return orderedUrls.map(u => byUrl[u]).filter(Boolean);
}

// ============================================================
// Adicionar artigo manual
// ============================================================
function openAddModal() {
  document.getElementById('add-modal').classList.add('visible');
  document.getElementById('manual-url').focus();
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('visible');
  document.getElementById('manual-url').value = '';
  document.getElementById('manual-title').value = '';
  document.getElementById('manual-summary').value = '';
}

function saveManualArticle() {
  const url = document.getElementById('manual-url').value.trim();
  const title = document.getElementById('manual-title').value.trim();
  const summary = document.getElementById('manual-summary').value.trim();
  if (!url || !title) {
    alert('Preencha URL e título.');
    return;
  }
  const all = getAllArticles();
  if (all.some(a => a.url === url)) {
    alert('Já existe artigo com essa URL.');
    return;
  }
  state.manualArticles.push({
    title,
    summary,
    url,
    published: new Date().toISOString(),
    source: 'manual',
    matched_sectors: ['— OUTROS'],
    matched_aliases: [],
    score: 1,
    _manual: true,
  });
  saveManualArticles();
  closeAddModal();
  render();
  showToast('Adicionada');
}

function deleteManualArticle(url) {
  if (!confirm('Remover esse artigo manual?')) return;
  state.manualArticles = state.manualArticles.filter(a => a.url !== url);
  if (state.selected.has(url)) {
    state.selected.delete(url);
    state.order = state.order.filter(u => u !== url);
    persist();
  }
  saveManualArticles();
  render();
  showToast('Removida');
}

// --- Review e cópia ---
function renderReview() {
  const items = getSelectedArticlesInOrder();
  document.getElementById('preview-n').textContent = items.length;
  if (!items.length) {
    document.getElementById('reorder-list').innerHTML = '<div class="empty">Nenhuma selecionada.</div>';
    document.getElementById('preview').textContent = '';
    return;
  }
  const lastIdx = items.length - 1;
  document.getElementById('reorder-list').innerHTML = items.map((a, i) => `
    <div class="reorder-item" data-url="${esc(a.url)}" data-index="${i}">
      <div class="drag-handle" data-url="${esc(a.url)}">⋮⋮</div>
      <div class="reorder-item-body">
        <div class="reorder-title">${esc(a.title)}</div>
        <div class="reorder-url">${esc(a.url)}</div>
      </div>
      <div class="item-actions">
        <button class="item-action-btn" data-action="top" data-url="${esc(a.url)}"
                title="Mover para o início" ${i === 0 ? 'disabled' : ''}>⤒</button>
        <button class="item-action-btn" data-action="bottom" data-url="${esc(a.url)}"
                title="Mover para o fim" ${i === lastIdx ? 'disabled' : ''}>⤓</button>
        <button class="item-action-btn danger" data-action="remove" data-url="${esc(a.url)}"
                title="Remover">×</button>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('.item-action-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.preventDefault();
      e.stopPropagation();
      const action = btn.dataset.action;
      const url = btn.dataset.url;
      if (action === 'remove') {
        toggleSelect(url);
      } else if (action === 'top') {
        moveToTop(url);
      } else if (action === 'bottom') {
        moveToBottom(url);
      }
      renderReview();
    };
  });

  bindDragHandlers();
  document.getElementById('preview').textContent = buildClippingText();
}

function moveToTop(url) {
  const newOrder = state.order.filter(u => u !== url);
  newOrder.unshift(url);
  state.order = newOrder;
  persist();
  hapticTap();
}

function moveToBottom(url) {
  const newOrder = state.order.filter(u => u !== url);
  newOrder.push(url);
  state.order = newOrder;
  persist();
  hapticTap();
}

function hapticTap() {
  // Feedback tátil discreto onde suportado (Android principalmente)
  if (navigator.vibrate) {
    try { navigator.vibrate(15); } catch(e) {}
  }
}

// Drag-and-drop com Pointer Events (unifica touch/mouse e dá movimento fluido)
let dragState = null;

function bindDragHandlers() {
  const list = document.getElementById('reorder-list');
  const handles = list.querySelectorAll('.drag-handle');

  handles.forEach(handle => {
    handle.onpointerdown = (e) => onDragStart(e, handle);
  });
}

function onDragStart(e, handle) {
  e.preventDefault();
  const item = handle.closest('.reorder-item');
  if (!item) return;

  // Captura o ponteiro pra receber move/up mesmo se sair do elemento
  try { handle.setPointerCapture(e.pointerId); } catch (err) {}

  const list = document.getElementById('reorder-list');
  const allItems = [...list.querySelectorAll('.reorder-item')];
  const startIdx = allItems.indexOf(item);
  const itemRect = item.getBoundingClientRect();

  // Calcula altura do item incluindo margin-bottom (8px). É a distância
  // que outros itens deslocam quando "abrem espaço".
  const itemHeight = itemRect.height + 8;

  dragState = {
    item,
    handle,
    pointerId: e.pointerId,
    startY: e.clientY,
    startIdx,
    currentIdx: startIdx,
    allItems,
    itemHeight,
    url: item.dataset.url,
  };

  item.classList.add('dragging');
  item.style.setProperty('--shift-amount', itemHeight + 'px');
  // Define a variavel pros outros itens calcularem o shift consistente
  document.documentElement.style.setProperty('--shift-amount', itemHeight + 'px');

  hapticTap();

  // Listeners no document pro caso do dedo sair do handle
  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragEnd);
  document.addEventListener('pointercancel', onDragEnd);
}

function onDragMove(e) {
  if (!dragState) return;
  e.preventDefault();

  const { item, startY, startIdx, allItems, itemHeight } = dragState;
  const dy = e.clientY - startY;

  // Move o item arrastado verticalmente
  item.style.transform = `translateY(${dy}px)`;

  // Calcula nova posição baseada no centro virtual do item arrastado
  const movedSlots = Math.round(dy / itemHeight);
  const newIdx = Math.max(0, Math.min(allItems.length - 1, startIdx + movedSlots));

  if (newIdx !== dragState.currentIdx) {
    dragState.currentIdx = newIdx;
    hapticTap();
  }

  // Aplica shift visual nos outros itens pra "abrir espaço"
  allItems.forEach((el, i) => {
    if (el === item) return;
    el.classList.remove('shifted-down', 'shifted-up');
    if (newIdx >= startIdx) {
      // Arrastando pra baixo: itens entre startIdx+1 e newIdx sobem
      if (i > startIdx && i <= newIdx) {
        el.classList.add('shifted-up');
      }
    } else {
      // Arrastando pra cima: itens entre newIdx e startIdx-1 descem
      if (i >= newIdx && i < startIdx) {
        el.classList.add('shifted-down');
      }
    }
  });
}

function onDragEnd(e) {
  if (!dragState) return;
  const { item, handle, pointerId, startIdx, currentIdx, url, allItems } = dragState;

  // Limpa estados visuais
  item.classList.remove('dragging');
  item.style.transform = '';
  allItems.forEach(el => el.classList.remove('shifted-down', 'shifted-up'));

  // Aplica reordenação se mudou de posição
  if (currentIdx !== startIdx) {
    const newOrder = state.order.filter(u => u !== url);
    // Calcula índice de inserção no array completo (state.order pode ter
    // URLs nao selecionadas tambem - mas getSelectedArticlesInOrder filtra)
    // Pegamos a URL do item que está atualmente em currentIdx (entre os
    // selecionados visiveis) e inserimos relativa a ela
    const visibleUrls = allItems
      .filter(el => el !== item)
      .map(el => el.dataset.url);
    // visibleUrls está na ordem original sem o item que arrastamos
    // Inserimos antes do item que está no slot currentIdx
    const targetUrl = visibleUrls[currentIdx > startIdx ? currentIdx - 1 : currentIdx];

    if (targetUrl) {
      const targetPos = newOrder.indexOf(targetUrl);
      const insertAfter = currentIdx > startIdx;
      newOrder.splice(insertAfter ? targetPos + 1 : targetPos, 0, url);
      state.order = newOrder;
      persist();
    }

    hapticTap();
    setTimeout(() => renderReview(), 50);
  }

  try { handle.releasePointerCapture(pointerId); } catch (err) {}
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);
  document.removeEventListener('pointercancel', onDragEnd);

  dragState = null;
}

function openReview() {
  document.getElementById('review-screen').classList.add('visible');
  renderReview();
}

function closeReview() {
  document.getElementById('review-screen').classList.remove('visible');
}

function buildClippingText() {
  const items = getSelectedArticlesInOrder();
  if (!items.length) return '';
  const today = new Date();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const day = today.getDate();
  const suffix = (day % 10 === 1 && day !== 11) ? 'st'
              : (day % 10 === 2 && day !== 12) ? 'nd'
              : (day % 10 === 3 && day !== 13) ? 'rd' : 'th';
  const header = `*Retail Daily - ${months[today.getMonth()]} ${day}${suffix}*\n\n`;
  return header + items.map(a => `${a.title}\n${a.url}`).join('\n\n');
}

async function copyClipping() {
  const text = buildClippingText();
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    showToast('Copiado!');
  } catch (e) {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copiado!');
  }
}

function showToast(msg) {
  const t = document.getElementById('copy-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1400);
}

// ============================================================
// Filtros / busca
// ============================================================
document.querySelectorAll('.pill').forEach(p => {
  p.onclick = () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    state.daysFilter = parseInt(p.dataset.days, 10);
    render();
  };
});

document.getElementById('search').oninput = (e) => {
  state.query = e.target.value;
  render();
};

// ESC fecha review e modal
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeReview();
    closeAddModal();
  }
});

// ============================================================
// Inicialização
// ============================================================
loadState();
fetchData().then(render);
</script>
