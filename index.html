<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Retail Daily</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📰%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #ffffff;
    --bg-elevated: #f7f7f7;
    --border: #e5e5e5;
    --text: #0f0f0f;
    --text-muted: #6e6e6e;
    --accent: #1a4d7a;
    --accent-fg: #ffffff;
    --tag-bg: #eef2f6;
    --tag-text: #1a4d7a;
    --source-bg: #f0ebe0;
    --source-text: #7a5f1a;
    --selected-bg: #eef6fc;
    --danger: #b32020;
    --manual-badge: #d4a017;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0a;
      --bg-elevated: #151515;
      --border: #242424;
      --text: #ececec;
      --text-muted: #8a8a8a;
      --accent: #7eb4e3;
      --accent-fg: #0a0a0a;
      --tag-bg: #1a2a38;
      --tag-text: #8bb9dc;
      --source-bg: #2a2618;
      --source-text: #c9a968;
      --selected-bg: #17283a;
      --danger: #e06b6b;
      --manual-badge: #e0b354;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.45;
    padding-bottom: calc(80px + env(safe-area-inset-bottom));
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: color-mix(in srgb, var(--bg) 85%, transparent);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { flex: 1; }
  h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  .meta {
    font-size: 12px; color: var(--text-muted);
    margin-top: 3px;
    display: flex; align-items: center; gap: 10px;
  }
  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 36px; height: 36px;
    border-radius: 8px;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.1s;
  }
  .icon-btn:active { background: var(--bg-elevated); }
  .refresh {
    background: none;
    border: 1px solid var(--border); color: var(--text-muted);
    padding: 6px 12px; border-radius: 6px;
    font-size: 12px; font-weight:500;
    cursor: pointer;
  }
  .filters {
    padding: 8px 16px; background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex; gap: 6px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .pill {
    flex-shrink: 0;
    padding: 5px 12px; border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 12px; font-weight: 500;
    color: var(--text-muted); background: var(--bg);
    cursor: pointer; transition: all 0.1s;
    white-space: nowrap;
  }
  .pill.active {
    background: var(--text); color: var(--bg); border-color: var(--text);
  }
  .search { padding: 8px 16px; border-bottom: 1px solid var(--border); }
  .search input {
    width: 100%; border: 1px solid var(--border);
    background: var(--bg-elevated); color: var(--text);
    padding: 8px 12px; border-radius: 8px; font-size: 14px;
    -webkit-appearance: none;
  }
  .search input:focus { outline: none; border-color: var(--accent); }
  main { padding: 0 16px 40px; }
  .group { margin-top: 22px; }
  .group-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
  }
  .group-title .count { color: var(--text-muted); font-weight: 400; margin-left: 6px; }

  article {
    display: flex; gap: 12px;
    padding: 12px 4px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    position: relative;
  }
  article.selected {
    background: var(--selected-bg);
    margin: 0 -8px; padding-left: 12px; padding-right: 12px;
    border-radius: 6px;
  }
  article:last-child { border-bottom: none; }
  .check {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    background: var(--bg);
    transition: all 0.1s;
  }
  .check.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check.checked::after {
    content: ""; width: 6px; height: 11px;
    border: solid var(--accent-fg);
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }
  .article-body { flex: 1; min-width: 0; }
  .article-title-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .article-title-row a {
    color: var(--text); text-decoration: none;
    font-weight: 500; line-height: 1.35;
    flex: 1;
  }
  .article-title-row a:active { color: var(--accent); }
  .manual-badge {
    font-size: 12px;
    opacity: 0.7;
    cursor: default;
  }
  .delete-manual {
    background: none;
    border: none;
    color: var(--danger);
    font-size: 14px;
    cursor: pointer;
    padding: 2px 4px;
    margin-left: 4px;
    opacity: 0.6;
    transition: opacity 0.1s;
  }
  .delete-manual:hover { opacity: 1; }
  .article-meta {
    font-size: 11.5px; color: var(--text-muted);
    margin-top: 5px;
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  }
  .tag {
    background: var(--tag-bg); color: var(--tag-text);
    padding: 1px 6px; border-radius: 3px;
    font-size: 10.5px; font-weight: 500;
  }
  .source-tag {
    background: var(--source-bg); color: var(--source-text);
    padding: 1px 6px; border-radius: 3px;
    font-size: 10.5px; font-weight: 600;
    letter-spacing: 0.02em;
  }
  .article-aliases {
    margin-top: 4px;
    font-size: 10px;
    color: var(--text-muted);
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
  }
  .alias-tag {
    background: color-mix(in srgb, var(--tag-bg) 60%, transparent);
    color: var(--tag-text);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 9.5px;
    font-weight: 400;
    opacity: 0.8;
  }
  .summary {
    font-size: 13.5px; color: var(--text-muted);
    margin-top: 6px; line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .empty {
    padding: 60px 20px; text-align: center;
    color: var(--text-muted); font-size: 14px; line-height: 1.6;
  }

  .action-bar {
    position: fixed; left: 0; right: 0;
    bottom: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: color-mix(in srgb, var(--bg) 95%, transparent);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center;
    transform: translateY(100%);
    transition: transform 0.2s ease-out;
    z-index: 20;
  }
  .action-bar.visible { transform: translateY(0); }
  .selected-count {
    font-size: 13px; font-weight: 500;
    color: var(--text-muted);
    flex: 1;
  }
  .selected-count strong { color: var(--text); font-size: 15px; }
  .btn {
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 14px; font-weight: 600;
    border: none; cursor: pointer;
    -webkit-appearance: none;
  }
  .btn-primary {
    background: var(--accent); color: var(--accent-fg);
  }
  .btn-primary:active { opacity: 0.85; }
  .btn-ghost {
    background: none; color: var(--text-muted);
    border: 1px solid var(--border);
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 40;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    visibility: hidden;
    opacity: 0;
    transition: opacity 0.2s, visibility 0.2s;
  }
  .modal-overlay.visible {
    visibility: visible;
    opacity: 1;
  }
  .modal {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 480px;
    padding: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }
  .modal h2 {
    font-size: 18px;
    margin-bottom: 16px;
    color: var(--text);
  }
  .modal label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 4px;
    color: var(--text-muted);
  }
  .modal input, .modal textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
    font-family: inherit;
  }
  .modal input:focus, .modal textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* telas de review */
  .screen {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 30;
    transform: translateX(100%);
    transition: transform 0.25s ease-out;
    overflow-y: auto;
    padding-bottom: calc(80px + env(safe-area-inset-bottom));
  }
  .screen.visible { transform: translateX(0); }
  .screen-header {
    position: sticky; top: 0; z-index: 2;
    background: color-mix(in srgb, var(--bg) 90%, transparent);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .back {
    background: none; border: none; color: var(--accent);
    font-size: 15px; cursor: pointer;
    padding: 4px 0;
  }
  .screen-title { font-size: 17px; font-weight: 600; flex: 1; text-align: center; }
  .screen-title-spacer { width: 50px; }
  .reorder-hint {
    padding: 12px 16px;
    font-size: 12.5px; color: var(--text-muted);
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
  }
  .reorder-list { padding: 8px 16px 20px; }
  .reorder-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 12px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    touch-action: pan-y;
    transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s;
  }
  .reorder-item.dragging {
    opacity: 0.92;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    z-index: 10;
    transition: none;
  }
  .reorder-item.drop-target { border-color: var(--accent); }
  .drag-handle {
    flex-shrink: 0;
    padding: 2px 8px 2px 0;
    color: var(--text-muted);
    font-size: 20px; line-height: 1;
    cursor: grab;
    touch-action: none;
    user-select: none;
  }
  .reorder-item-body { flex: 1; min-width: 0; }
  .reorder-title {
    font-size: 14px; font-weight: 500;
    line-height: 1.35; color: var(--text);
  }
  .reorder-url {
    font-size: 11.5px; color: var(--text-muted);
    margin-top: 4px; word-break: break-all;
  }
  .remove-btn {
    flex-shrink: 0;
    background: none; border: none;
    color: var(--danger);
    font-size: 18px; padding: 0 4px;
    cursor: pointer;
    align-self: center;
  }
  .preview {
    margin: 16px; padding: 14px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: -apple-system, "Menlo", "Consolas", monospace;
    font-size: 12.5px;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
    line-height: 1.5;
  }
  .copy-success {
    position: fixed;
    bottom: calc(90px + env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1e8a3c; color: white;
    padding: 10px 18px; border-radius: 20px;
    font-size: 13px; font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
    z-index: 50;
  }
  .copy-success.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- Modal para adicionar notícia manual -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>➕ Adicionar notícia manual</h2>
    <form id="manual-form" onsubmit="return false;">
      <label for="manual-url">URL da notícia *</label>
      <input type="url" id="manual-url" placeholder="https://..." required>
      
      <button type="button" class="btn btn-ghost" onclick="autoFillFromUrl()" style="margin-bottom: 16px; width: 100%;">✨ Preencher a partir da URL</button>
      
      <label for="manual-title">Título *</label>
      <input type="text" id="manual-title" placeholder="Título da notícia" required>
      <label for="manual-summary">Resumo (opcional)</label>
      <textarea id="manual-summary" rows="2" placeholder="Breve descrição..."></textarea>
      <label for="manual-date">Data (opcional, formato ISO)</label>
      <input type="text" id="manual-date" placeholder="2026-04-22T10:30:00Z">
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary" onclick="addManualArticle()">Adicionar</button>
      </div>
    </form>
  </div>
</div>

<div id="main-screen">
  <header>
    <div class="header-left">
      <h1>Retail Daily</h1>
      <div class="meta">
        <span id="status">Carregando…</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="openModal()" title="Adicionar notícia manual">➕</button>
      <button class="refresh" onclick="location.reload()">Atualizar</button>
    </div>
  </header>
  <div class="search">
    <input type="search" id="search" placeholder="Buscar título ou descrição…" autocomplete="off">
  </div>
  <div class="filters" id="time-filters">
    <button class="pill active" data-days="1">1d</button>
    <button class="pill" data-days="2">2d</button>
    <button class="pill" data-days="3">3d</button>
    <button class="pill" data-days="4">4d</button>
    <button class="pill" data-days="5">5d</button>
  </div>
  <main id="list"></main>

  <div class="action-bar" id="action-bar">
    <div class="selected-count">
      <strong id="selected-n">0</strong> selecionadas
    </div>
    <button class="btn btn-ghost" onclick="clearSelection()">Limpar</button>
    <button class="btn btn-primary" onclick="openReview()">Revisar →</button>
  </div>
</div>

<div class="screen" id="review-screen">
  <div class="screen-header">
    <button class="back" onclick="closeReview()">← Voltar</button>
    <div class="screen-title">Revisar clipping</div>
    <div class="screen-title-spacer"></div>
  </div>
  <div class="reorder-hint">
    Arraste pelo <strong>⋮⋮</strong> para reordenar. Toque no <strong>×</strong> para remover.
  </div>
  <div class="reorder-list" id="reorder-list"></div>
  <div class="preview" id="preview"></div>
  <div class="action-bar visible" style="position: fixed;">
    <div class="selected-count">
      <strong id="preview-n">0</strong> no clipping
    </div>
    <button class="btn btn-primary" onclick="copyClipping()">📋 Copiar</button>
  </div>
</div>

<div class="copy-success" id="copy-toast">Copiado!</div>

<script>
'use strict';

// ============================================================
// Mapeamento de setores e veículos
// ============================================================
const SECTOR_LABELS = {
  'Fashion': 'Moda',
  'Joias': 'Joias',
  'E-commerce': 'E‑commerce',
  'Varejo Alimentar': 'Varejo Alimentar',
  'Academias': 'Academias',
  'Cosméticos': 'Cosméticos',
  'Farmácias': 'Farmácias',
  'Economia': 'Economia',
  'Material de Construção': 'Material de Construção',
  'Eletrônicos': 'Eletrônicos',
  'Viagens': 'Viagens',
  'Pet': 'Pet',
  'Wellness e Esportes': 'Wellness/Esportes',
  'Global Consumer': 'Global',
};

// ORDEM DE PRIORIDADE DEFINIDA PELO USUÁRIO
const SECTOR_PRIORITY = [
  'E-commerce',
  'Farmácias',
  'Academias',
  'Varejo Alimentar',
  'Fashion',
  'Cosméticos',
  'Joias',
  'Eletrônicos',
  'Economia',
  'Wellness e Esportes',
  'Pet',
  'Material de Construção',
  'Viagens',
  'Global Consumer'
];

// Regras de extração de veículo a partir da URL
const SOURCE_PATTERNS = [
  [/valor\.globo\.com|valor\.com\.br|valorinveste/i, 'Valor'],
  [/pipeline\.valor/i,                              'Pipeline'],
  [/oglobo\.globo\.com/i,                           'O Globo'],
  [/epocanegocios\.globo/i,                         'Época Negócios'],
  [/revistapegn\.globo/i,                           'PEGN'],
  [/g1\.globo\.com/i,                               'G1'],
  [/folha\.uol|folha\.com/i,                        'Folha'],
  [/estadao\.com/i,                                 'Estadão'],
  [/exame\.com/i,                                   'Exame'],
  [/veja\.abril/i,                                  'Veja'],
  [/infomoney\.com/i,                               'InfoMoney'],
  [/neofeed\.com/i,                                 'NeoFeed'],
  [/braziljournal/i,                                'Brazil Journal'],
  [/metropoles\.com/i,                              'Metrópoles'],
  [/cnnbrasil/i,                                    'CNN Brasil'],
  [/bloomberglinea/i,                               'Bloomberg Línea'],
  [/bloomberg/i,                                    'Bloomberg'],
  [/wsj\.com/i,                                     'WSJ'],
  [/ft\.com/i,                                      'Financial Times'],
  [/bbc\.com/i,                                     'BBC'],
  [/cnbc\.com/i,                                    'CNBC'],
  [/reuters/i,                                      'Reuters'],
  [/forbes/i,                                       'Forbes'],
  [/jota\.info/i,                                   'JOTA'],
  [/gov\.br/i,                                      'Governo Federal'],
  [/mercadoeconsumo/i,                              'Mercado & Consumo'],
  [/ambito/i,                                       'Ámbito'],
  [/iproup/i,                                       'iProUP'],
  [/eleconomista/i,                                 'El Economista'],
  [/elfinanciero/i,                                 'El Financiero'],
  [/uol\.com/i,                                     'UOL'],
];

function extractSource(url) {
  if (!url) return '';
  const m = url.match(/^https?:\/\/(?:www\d*\.|feeds\.|rss\.|br\.|en\.|pt\.|api\.)?([^/]+)/i);
  if (!m) return '';
  const host = m[1].toLowerCase();
  for (const [pat, label] of SOURCE_PATTERNS) {
    if (pat.test(host)) return label;
  }
  const parts = host.split('.');
  if (parts.length >= 3 && parts[parts.length - 2].length <= 3) {
    return parts[parts.length - 3].replace(/^\w/, c => c.toUpperCase());
  }
  if (parts.length >= 2) {
    return parts[parts.length - 2].replace(/^\w/, c => c.toUpperCase());
  }
  return host;
}

// ============================================================
// Estado
// ============================================================
const state = {
  articles: [],
  manualArticles: [],
  generatedAt: null,
  days: 1,
  query: '',
  selected: new Set(JSON.parse(localStorage.getItem('selected') || '[]')),
  order: JSON.parse(localStorage.getItem('order') || '[]'),
};

function loadManualArticles() {
  try {
    const stored = localStorage.getItem('manualArticles');
    if (stored) state.manualArticles = JSON.parse(stored);
  } catch (e) { state.manualArticles = []; }
}
function saveManualArticles() {
  localStorage.setItem('manualArticles', JSON.stringify(state.manualArticles));
}

function getAllArticles() {
  const jsonUrls = new Set(state.articles.map(a => a.url));
  const filteredManuals = state.manualArticles.filter(a => !jsonUrls.has(a.url));
  return [...state.articles, ...filteredManuals];
}

async function load() {
  loadManualArticles();
  try {
    const r = await fetch('data/articles.json?t=' + Date.now());
    if (!r.ok) throw new Error('no data');
    const data = await r.json();
    state.articles = data.articles || [];
    state.generatedAt = data.generated_at;
  } catch (e) {
    state.articles = [];
    document.getElementById('status').textContent = 'Sem dados (offline?)';
  }
  render();
}

function getCutoff(days) {
  // Obtém a data/hora atual no fuso de Brasília (UTC-3)
  const now = new Date();
  const brDate = new Date(now.toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
  
  // Define o corte: 6h30 (BRT) do dia atual menos 'days' dias
  // Ex.: para days=1, o corte será 6h30 do dia anterior ao dia atual
  const cutoff = new Date(brDate);
  cutoff.setDate(cutoff.getDate() - days);
  cutoff.setHours(6, 30, 0, 0);
  
  return cutoff.getTime();
}

function relative(iso) {
  if (!iso) return '';
  const ms = Date.now() - new Date(iso).getTime();
  const min = Math.floor(ms / 60000);
  if (min < 1) return 'agora';
  if (min < 60) return 'há ' + min + 'min';
  const h = Math.floor(min / 60);
  if (h < 24) return 'há ' + h + 'h';
  return 'há ' + Math.floor(h / 24) + 'd';
}
function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function persist() {
  localStorage.setItem('selected', JSON.stringify([...state.selected]));
  localStorage.setItem('order', JSON.stringify(state.order));
}

function filterArticles(articles) {
  const cutoff = getCutoff(state.days);
  const q = state.query.toLowerCase();
  return articles.filter(a => {
    if (cutoff && a.published && new Date(a.published).getTime() < cutoff) return false;
    if (q) {
      const hay = (a.title + ' ' + (a.summary || '')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function getPrimarySector(sectors) {
  if (!sectors || sectors.length === 0) return null;
  for (const prioritySector of SECTOR_PRIORITY) {
    if (sectors.includes(prioritySector)) {
      return prioritySector;
    }
  }
  return sectors[0];
}

function render() {
  const all = getAllArticles();
  const filtered = filterArticles(all);
  
  const parts = [];
  if (state.generatedAt) parts.push('Atualizado ' + relative(state.generatedAt));
  const manualCount = state.manualArticles.length;
  const totalCount = filtered.length;
  parts.push(totalCount + (totalCount === 1 ? ' matéria' : ' matérias'));
  if (manualCount > 0) parts.push(`✏️ ${manualCount} manual(is)`);
  document.getElementById('status').textContent = parts.join(' · ');

  if (!filtered.length) {
    document.getElementById('list').innerHTML = '<div class="empty">Nenhuma matéria com os filtros atuais.</div>';
    updateActionBar();
    return;
  }

  const groups = {};
  for (const a of filtered) {
    const primary = getPrimarySector(a.matched_sectors);
    const key = primary || '— OUTROS';
    (groups[key] = groups[key] || []).push(a);
  }

  for (const key of Object.keys(groups)) {
    groups[key].sort((a, b) => {
      const ta = a.published ? new Date(a.published).getTime() : -Infinity;
      const tb = b.published ? new Date(b.published).getTime() : -Infinity;
      return tb - ta;
    });
  }

  // Ordenação dos grupos conforme a prioridade definida
  const orderedKeys = Object.keys(groups).sort((a, b) => {
    if (a === '— OUTROS') return 1;
    if (b === '— OUTROS') return -1;
    const indexA = SECTOR_PRIORITY.indexOf(a);
    const indexB = SECTOR_PRIORITY.indexOf(b);
    if (indexA === -1 && indexB === -1) return a.localeCompare(b);
    if (indexA === -1) return 1;
    if (indexB === -1) return -1;
    return indexA - indexB;
  });

  function getGroupTitle(key) {
    if (key === '— OUTROS') return '— OUTROS';
    return SECTOR_LABELS[key] || key;
  }

  document.getElementById('list').innerHTML = orderedKeys.map(key => {
    const articles = groups[key];
    return `
    <section class="group">
      <div class="group-title">${esc(getGroupTitle(key))}<span class="count">${articles.length}</span></div>
      ${articles.map(a => {
        const sourceLabel = extractSource(a.url);
        const sourceTag = sourceLabel ? `<span class="source-tag">${esc(sourceLabel)}</span>` : '';
        const otherSectors = (a.matched_sectors || []).filter(s => s !== key).map(s => `<span class="tag">${esc(s)}</span>`).join('');
        const aliases = (a.matched_aliases || []).map(al => `<span class="alias-tag">${esc(al)}</span>`).join('');
        const isSelected = state.selected.has(a.url);
        const isManual = a._manual === true;
        return `
        <article class="${isSelected ? 'selected' : ''}" data-url="${esc(a.url)}">
          <div class="check ${isSelected ? 'checked' : ''}" data-url="${esc(a.url)}"></div>
          <div class="article-body">
            <div class="article-title-row">
              <a href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.title)}</a>
              ${isManual ? `<span class="manual-badge" title="Adicionado manualmente">✏️</span>` : ''}
              ${isManual ? `<button class="delete-manual" data-url="${esc(a.url)}" onclick="deleteManualArticle('${esc(a.url)}')" title="Remover artigo manual">🗑️</button>` : ''}
            </div>
            <div class="article-meta">
              ${sourceTag}
              ${a.published ? esc(formatDate(a.published)) : ''}
              ${otherSectors}
            </div>
            ${aliases ? `<div class="article-aliases">🔍 ${aliases}</div>` : ''}
            ${a.summary ? `<div class="summary">${esc(a.summary)}</div>` : ''}
          </div>
        </article>`;
      }).join('')}
    </section>`;
  }).join('');

  document.querySelectorAll('.check').forEach(box => {
    box.onclick = (e) => {
      e.preventDefault(); e.stopPropagation();
      toggleSelect(box.dataset.url);
    };
  });

  updateActionBar();
}

function toggleSelect(url) {
  if (state.selected.has(url)) {
    state.selected.delete(url);
    state.order = state.order.filter(u => u !== url);
  } else {
    state.selected.add(url);
    if (!state.order.includes(url)) state.order.push(url);
  }
  persist();
  document.querySelectorAll(`.check[data-url="${CSS.escape(url)}"]`).forEach(box => {
    box.classList.toggle('checked', state.selected.has(url));
    box.closest('article').classList.toggle('selected', state.selected.has(url));
  });
  updateActionBar();
}

function clearSelection() {
  if (state.selected.size === 0) return;
  if (!confirm('Limpar todas as ' + state.selected.size + ' selecionadas?')) return;
  state.selected.clear();
  state.order = [];
  persist();
  render();
}

function updateActionBar() {
  const n = state.selected.size;
  document.getElementById('selected-n').textContent = n;
  document.getElementById('action-bar').classList.toggle('visible', n > 0);
}

function getSelectedArticlesInOrder() {
  const all = getAllArticles();
  const byUrl = new Map(all.map(a => [a.url, a]));
  return state.order
    .filter(url => state.selected.has(url) && byUrl.has(url))
    .map(url => byUrl.get(url));
}

function formatTodayEn() {
  const d = new Date();
  const month = d.toLocaleString('en-US', { month: 'short' });
  const day = d.getDate();
  const suffix = (day % 10 === 1 && day !== 11) ? 'st' : (day % 10 === 2 && day !== 12) ? 'nd' : (day % 10 === 3 && day !== 13) ? 'rd' : 'th';
  return `${month} ${day}${suffix}`;
}

function buildClippingText() {
  const items = getSelectedArticlesInOrder();
  const header = `*Retail Daily - ${formatTodayEn()}*`;
  const body = items.map(a => `${a.title}\n${a.url}`).join('\n\n');
  return header + '\n\n' + body;
}

// --- Modal e adição manual ---
function openModal() {
  document.getElementById('modal-overlay').classList.add('visible');
  document.getElementById('manual-url').value = '';
  document.getElementById('manual-title').value = '';
  document.getElementById('manual-summary').value = '';
  document.getElementById('manual-date').value = '';
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('visible');
}

async function autoFillFromUrl() {
  const urlInput = document.getElementById('manual-url');
  const titleInput = document.getElementById('manual-title');
  const summaryInput = document.getElementById('manual-summary');
  
  let url = urlInput.value.trim();
  if (!url) {
    alert('Por favor, insira a URL primeiro.');
    return;
  }

  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    url = 'https://' + url;
    urlInput.value = url;
  }

  const btn = event.target;
  const originalText = btn.textContent;
  btn.textContent = '⏳ Buscando...';
  btn.disabled = true;

  try {
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    const response = await fetch(proxyUrl);
    if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);
    
    const html = await response.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    
    let title = '';
    const ogTitle = doc.querySelector('meta[property="og:title"]');
    if (ogTitle && ogTitle.content) {
      title = ogTitle.content.trim();
    } else {
      const titleTag = doc.querySelector('title');
      if (titleTag) title = titleTag.textContent.trim();
    }
    
    let description = '';
    const ogDesc = doc.querySelector('meta[property="og:description"]');
    if (ogDesc && ogDesc.content) {
      description = ogDesc.content.trim();
    } else {
      const metaDesc = doc.querySelector('meta[name="description"]');
      if (metaDesc && metaDesc.content) {
        description = metaDesc.content.trim();
      } else {
        const firstP = doc.querySelector('p');
        if (firstP) description = firstP.textContent.trim();
      }
    }
    
    if (title) titleInput.value = title;
    if (description) summaryInput.value = description;
    
    if (!title && !description) {
      alert('Não foi possível extrair informações. Preencha manualmente.');
    } else {
      showToast('Dados preenchidos!');
    }
  } catch (error) {
    console.error('Erro ao buscar URL:', error);
    alert('Falha ao acessar a URL. Verifique o link ou preencha manualmente.');
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

function addManualArticle() {
  const url = document.getElementById('manual-url').value.trim();
  const title = document.getElementById('manual-title').value.trim();
  const summary = document.getElementById('manual-summary').value.trim();
  let published = document.getElementById('manual-date').value.trim();
  
  if (!url || !title) {
    alert('URL e Título são obrigatórios.');
    return;
  }
  
  const all = getAllArticles();
  if (all.some(a => a.url === url)) {
    alert('Esta URL já existe na lista.');
    return;
  }
  
  let publishedDate = null;
  if (published) {
    try { publishedDate = new Date(published).toISOString(); }
    catch { publishedDate = new Date().toISOString(); }
  } else {
    publishedDate = new Date().toISOString();
  }
  
  const newArticle = {
    title, url, summary,
    published: publishedDate,
    source: 'manual',
    matched_sectors: [],
    matched_aliases: [],
    score: 0,
    _manual: true
  };
  
  state.manualArticles.push(newArticle);
  saveManualArticles();
  closeModal();
  render();
  showToast('Notícia adicionada!');
}

function deleteManualArticle(url) {
  if (!confirm('Remover esta notícia manual?')) return;
  state.manualArticles = state.manualArticles.filter(a => a.url !== url);
  if (state.selected.has(url)) {
    state.selected.delete(url);
    state.order = state.order.filter(u => u !== url);
    persist();
  }
  saveManualArticles();
  render();
  showToast('Removida');
}

// --- Review e cópia ---
function renderReview() {
  const items = getSelectedArticlesInOrder();
  document.getElementById('preview-n').textContent = items.length;
  if (!items.length) {
    document.getElementById('reorder-list').innerHTML = '<div class="empty">Nenhuma selecionada.</div>';
    document.getElementById('preview').textContent = '';
    return;
  }
  document.getElementById('reorder-list').innerHTML = items.map((a, i) => `
    <div class="reorder-item" data-url="${esc(a.url)}" data-index="${i}">
      <div class="drag-handle" data-url="${esc(a.url)}">⋮⋮</div>
      <div class="reorder-item-body">
        <div class="reorder-title">${esc(a.title)}</div>
        <div class="reorder-url">${esc(a.url)}</div>
      </div>
      <button class="remove-btn" data-url="${esc(a.url)}" aria-label="Remover">×</button>
    </div>
  `).join('');
  document.querySelectorAll('.remove-btn').forEach(btn => {
    btn.onclick = () => {
      toggleSelect(btn.dataset.url);
      renderReview();
    };
  });
  bindDragHandlers();
  document.getElementById('preview').textContent = buildClippingText();
}

let dragState = null;
function bindDragHandlers() {
  const list = document.getElementById('reorder-list');
  const items = [...list.querySelectorAll('.reorder-item')];
  items.forEach(item => {
    const handle = item.querySelector('.drag-handle');
    const onStart = (e) => {
      e.preventDefault();
      const touch = e.touches ? e.touches[0] : e;
      dragState = { item, startY: touch.clientY, url: item.dataset.url, dropTarget: null };
      item.classList.add('dragging');
    };
    handle.addEventListener('touchstart', onStart, { passive: false });
    handle.addEventListener('mousedown', onStart);
  });
  const onMove = (e) => {
    if (!dragState) return;
    e.preventDefault();
    const touch = e.touches ? e.touches[0] : e;
    const dy = touch.clientY - dragState.startY;
    dragState.item.style.transform = `translateY(${dy}px)`;
    const allItems = [...list.querySelectorAll('.reorder-item')];
    allItems.forEach(el => el.classList.remove('drop-target'));
    const pointerY = touch.clientY;
    const target = allItems.find(el => {
      if (el === dragState.item) return false;
      const r = el.getBoundingClientRect();
      return pointerY > r.top && pointerY < r.bottom;
    });
    if (target) target.classList.add('drop-target');
    dragState.dropTarget = target;
  };
  const onEnd = (e) => {
    if (!dragState) return;
    const { item, dropTarget, url } = dragState;
    item.classList.remove('dragging');
    item.style.transform = '';
    document.querySelectorAll('.reorder-item').forEach(el => el.classList.remove('drop-target'));
    if (dropTarget && dropTarget !== item) {
      const targetUrl = dropTarget.dataset.url;
      const newOrder = state.order.filter(u => u !== url);
      const targetIdx = newOrder.indexOf(targetUrl);
      const rect = dropTarget.getBoundingClientRect();
      const pointerY = (e.changedTouches ? e.changedTouches[0] : e).clientY;
      const insertAfter = pointerY > rect.top + rect.height / 2;
      newOrder.splice(insertAfter ? targetIdx + 1 : targetIdx, 0, url);
      state.order = newOrder;
      persist();
      renderReview();
    }
    dragState = null;
  };
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchend', onEnd);
  document.addEventListener('mouseup', onEnd);
}

function openReview() {
  renderReview();
  document.getElementById('review-screen').classList.add('visible');
}
function closeReview() {
  document.getElementById('review-screen').classList.remove('visible');
}

async function copyClipping() {
  const text = buildClippingText();
  try {
    await navigator.clipboard.writeText(text);
    showToast('Copiado!');
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast('Copiado!'); }
    catch (err) { alert('Não foi possível copiar.\n\n' + text); }
    document.body.removeChild(ta);
  }
}
function showToast(msg) {
  const t = document.getElementById('copy-toast');
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 1800);
}

// Event listeners
for (const btn of document.querySelectorAll('#time-filters .pill')) {
  btn.onclick = () => {
    state.days = parseInt(btn.dataset.days);
    document.querySelectorAll('#time-filters .pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
}
document.getElementById('search').oninput = e => { state.query = e.target.value; render(); };
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target.classList.contains('modal-overlay')) closeModal();
});

load();
</script>
