name: Clipping diário

on:
  schedule:
    # 09:00 UTC = 06:00 BRT (seg a sex)
    - cron: '0 9 * * 1-5'

  workflow_dispatch:
    inputs:
      rescore:
        description: 'Rodar com rescore?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

concurrency:
  group: clipping-daily
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install feedparser requests beautifulsoup4 pyyaml

      - name: Rodar com rescore
        if: ${{ inputs.rescore == 'true' }}
        run: python clipping.py --output-json data/articles.json --since 48 --rescore

      - name: Rodar normal
        if: ${{ inputs.rescore == 'false' }}
        run: python clipping.py --output-json data/articles.json --since 48

      - name: Commitar resultado
        run: |
          git config user.name "clipping-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          if git diff --staged --quiet; then
            echo "Sem novidades."
          else
            git commit -m "Clipping $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
